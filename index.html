<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Intent Sem Lei</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}
#login{ margin-top:100px; }
#site{ display:none; }
#chat{
  width:80%;
  height:300px;
  margin:auto;
  overflow:auto;
  border:1px solid #444;
  padding:10px;
}
input, button{
  padding:5px;
  margin:5px;
}
button{
  background:#ff2e2e;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>

<script>
const senhaCorreta = "00000";

function entrar(){
  let senha = document.getElementById("senha").value;
  if(senha === senhaCorreta){
    document.getElementById("login").style.display="none";
    document.getElementById("site").style.display="block";
    atualizar(); // já carrega o chat
  }else{
    alert("Senha incorreta");
  }
}

function enviar(){
  let nome = document.getElementById("nome").value.trim();
  let msg = document.getElementById("msg").value.trim();

  if(nome=="" || msg==""){ alert("Coloque apelido e mensagem"); return; }

  fetch("enviar.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:"nome="+encodeURIComponent(nome)+"&msg="+encodeURIComponent(msg)
  }).then(()=>{ // só atualiza depois que PHP terminar
    document.getElementById("msg").value="";
    atualizar();
  });
}

function atualizar(){
  fetch("chat.txt?"+new Date().getTime()) // evita cache
  .then(r=>r.text())
  .then(t=>{
    document.getElementById("chat").innerHTML = t;
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
  });
}

setInterval(()=>{ if(document.getElementById("site").style.display=="block") atualizar(); },1000);

</script>
</head>
<body>

<div id="login">
  <h1>Intent Sem Lei</h1>
  <p>Opa, pra entrar nesse site você precisa digitar a senha</p>
  <input id="senha" type="password" placeholder="Digite a senha"><br>
  <button onclick="entrar()">Entrar</button>
</div>

<div id="site">
  <h1>Intent Sem Lei</h1>
  <div id="chat"></div>
  <input id="nome" placeholder="apelido">
  <input id="msg" placeholder="mensagem">
  <button onclick="enviar()">Enviar</button>
</div>

</body>
</html>
