<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat dos Amigos</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

#chat{
  width:80%;
  height:300px;
  margin:auto;
  overflow:auto;
  border:1px solid #444;
  padding:10px;
}

input{
  padding:5px;
  margin:5px;
}
</style>

<script>
function enviar(){
  let nome = document.getElementById("nome").value
  let msg = document.getElementById("msg").value

  fetch("enviar.php",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:"nome="+nome+"&msg="+msg
  })

  document.getElementById("msg").value=""
}

function atualizar(){
  fetch("chat.txt")
  .then(r=>r.text())
  .then(t=>{
    document.getElementById("chat").innerHTML = t
  })
}

setInterval(atualizar,1000)
</script>

</head>
<body>

<h1>Chat dos Amigos</h1>

<div id="chat"></div>

<input id="nome" placeholder="apelido">
<input id="msg" placeholder="mensagem">
<button onclick="enviar()">Enviar</button>

</body>
</html>
